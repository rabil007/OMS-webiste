<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Dark navy rounded-square background -->
  <rect width="64" height="64" rx="14" fill="#06101E"/>

  <!-- ── Compass cardinal spikes (N / S / E / W) ── -->
  <polygon points="32,3  29,13 35,13" fill="#2B7DE9"/>
  <polygon points="32,61 29,51 35,51" fill="#2B7DE9"/>
  <polygon points="3,32  13,29 13,35" fill="#2B7DE9"/>
  <polygon points="61,32 51,29 51,35" fill="#2B7DE9"/>

  <!-- ── Compass diagonal spikes (NE / NW / SE / SW) — slightly smaller ── -->
  <polygon points="52,12 44,22 48,26" fill="#4A93F0" opacity="0.75"/>
  <polygon points="12,12 20,22 16,26" fill="#4A93F0" opacity="0.75"/>
  <polygon points="52,52 44,42 48,38" fill="#4A93F0" opacity="0.75"/>
  <polygon points="12,52 20,42 16,38" fill="#4A93F0" opacity="0.75"/>

  <!-- ── Outer compass ring ── -->
  <circle cx="32" cy="32" r="19" fill="none" stroke="#2B7DE9" stroke-width="2"/>

  <!-- ── Ship silhouette (inside ring) ── -->
  <!-- Cabin / bridge -->
  <rect x="27" y="20" width="10" height="8" rx="1.5" fill="#2B7DE9"/>
  <!-- Main hull body -->
  <rect x="22" y="27" width="20" height="8" rx="1" fill="#2B7DE9"/>
  <!-- Curved hull bottom -->
  <path d="M20 35 Q32 43 44 35 Z" fill="#2B7DE9"/>

  <!-- ── Wave lines below ship ── -->
  <path d="M22 43 Q26 41 30 43 Q34 45 38 43 Q42 41 42 41"
        fill="none" stroke="#2B7DE9" stroke-width="1.8"
        stroke-linecap="round" stroke-linejoin="round"/>
</svg>